name: Splunk App CI/CD

on:
  push:
    branches:
      - "**"
    tags:
      - "v*.*.*"

permissions:
  pull-requests: write
  actions: write
  checks: write
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Determine version
        id: version
        shell: bash
        run: |
          SHORT_COMMIT_HASH=$(git rev-parse --short HEAD)
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG_VERSION=${GITHUB_REF#refs/tags/v}
          else
            TAG_VERSION="1.0.0"
          fi
          VERSION_WITH_HASH="${TAG_VERSION}+${SHORT_COMMIT_HASH}"
          echo "VERSION_WITH_HASH=${VERSION_WITH_HASH}" >> $GITHUB_OUTPUT
          echo "TAG_VERSION=${TAG_VERSION}" >> $GITHUB_OUTPUT

      - name: Install UCC framework
        run: pip install --upgrade splunk-add-on-ucc-framework

      - name: Build add-on (ucc-gen)
        shell: bash
        run: |
          ucc-gen build --source package --ta-version "${{ steps.version.outputs.TAG_VERSION }}"
          # Normalise permissions — AppInspect rejects 775/664. App dirs 755, files 644.
          mkdir -p stage
          cp -r output/TA-uk-open-data stage/TA-uk-open-data
          find stage/TA-uk-open-data -type d -exec chmod 755 {} +
          find stage/TA-uk-open-data -type f -exec chmod 644 {} +

      - name: Generate package tarball
        shell: bash
        run: |
          mkdir -p dist
          cd stage
          tar -czf ../dist/TA-uk-open-data-${{ steps.version.outputs.VERSION_WITH_HASH }}.tar.gz TA-uk-open-data/
          cd ..
          ls -la dist/

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Upload stage directory for inspection
        uses: actions/upload-artifact@v4
        with:
          name: stage-contents
          path: stage/TA-uk-open-data/

  integration-test:
    name: integration-test (splunk-docker)
    needs: package
    # Dependabot actors get no egress/secrets, so the live Splunk E2E can only
    # fail for them. CLI AppInspect still covers Dependabot PRs.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install UCC framework + pytest
        run: pip install --upgrade splunk-add-on-ucc-framework pytest

      - name: Build add-on into stage/
        shell: bash
        run: |
          ucc-gen build --source package --ta-version 1.0.2
          rm -rf stage && mkdir -p stage
          cp -r output/TA-uk-open-data stage/TA-uk-open-data
          # The test container's splunk user (a different uid) must read the app
          # and write local/inputs.conf + checkpoints into the bind mount. Wide
          # perms are fine on this throwaway copy — it is never the artefact.
          chmod -R 777 stage/TA-uk-open-data

      - name: Start Splunk (wait for health)
        working-directory: docker
        run: docker compose up -d --wait --wait-timeout 360

      - name: Run integration suite
        env:
          SPLUNK_MGMT_URL: https://127.0.0.1:8089
          SPLUNK_USER: admin
          SPLUNK_PASSWORD: Changeme1!
          SPLUNK_CONTAINER: ta_uk_open_data_splunk
        run: pytest tests/ -v -ra

      - name: Splunk logs on failure
        if: failure()
        working-directory: docker
        run: |
          docker compose logs --tail 300 splunk || true
          docker exec ta_uk_open_data_splunk tail -n 300 /opt/splunk/var/log/splunk/splunkd.log || true

      - name: Tear down
        if: always()
        working-directory: docker
        run: docker compose down -v || true

  appinspect:
    name: quality-appinspect
    needs: package
    uses: livehybrid/deploy-splunk-app-action/.github/workflows/appinspect-cli.yml@main
    with:
      tags: "cloud,future,private_victoria"
    secrets:
      token: "${{ secrets.GITHUB_TOKEN }}"

  quality-appinspect-api:
    name: quality-appinspect-api
    needs:
      - appinspect
    uses: livehybrid/deploy-splunk-app-action/.github/workflows/appinspect-api.yml@main
    secrets:
      splunkbase_username: ${{ secrets.SPLUNKBASE_USERNAME }}
      splunkbase_password: ${{ secrets.SPLUNKBASE_PASSWORD }}

  publish-gh:
    permissions:
      contents: write
    needs:
      - appinspect
      - integration-test
    uses: livehybrid/deploy-splunk-app-action/.github/workflows/publish.yml@main

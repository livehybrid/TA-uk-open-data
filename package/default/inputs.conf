#
# Modular-input scheme + default stanzas for TA-uk-open-data.
#
# Splunk registers a modular-input kind from the bin/<name>.py script together
# with a matching stanza in this file. These two inputs are hand-written
# splunklib.modularinput scripts, and ucc-gen 6.5.x does NOT emit inputs.conf
# for them from globalConfig.json, so the stanzas must be shipped in the
# package or splunkd never registers the input (the /services/data/modular-inputs
# endpoint 404s). AppInspect (cloud) additionally requires python.version to be
# declared at the scheme level, and python.required for Splunk 10 dual runtime.
#

[carbon_intensity]
python.version = python3.9
python.required = 3.9,3.13

[carbon_intensity://default]
python.version = python3.9
python.required = 3.9,3.13
interval = 1800
index = default
lookback_days = 2
disabled = true

[nhs_ae]
python.version = python3.9
python.required = 3.9,3.13

[nhs_ae://default]
python.version = python3.9
python.required = 3.9,3.13
interval = 86400
index = default
financial_years = 2025-26,2026-27
disabled = true
